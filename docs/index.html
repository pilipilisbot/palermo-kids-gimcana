<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gimcana Palerm · El Codi del Gelat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body { margin:0; height:100%; font-family: Arial, sans-serif; background:#f6f7fb; }
    #map { width:100%; height:100%; }
    #title {
      position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:1000;
      background:rgba(255,255,255,.95); padding:10px 14px; border-radius:10px; font-weight:700;
      box-shadow:0 2px 10px rgba(0,0,0,.15); text-align:center;
    }
    #progress {
      position:absolute; top:66px; left:50%; transform:translateX(-50%); z-index:1000;
      background:rgba(255,255,255,.95); padding:8px 12px; border-radius:10px; font-size:14px;
      box-shadow:0 2px 10px rgba(0,0,0,.12);
    }
    .btn { background:#0d6efd; color:#fff; border:none; border-radius:8px; padding:8px 12px; cursor:pointer; font-weight:600; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .small { font-size:13px; color:#555; }
    .code-chip { display:inline-block; background:#fff3cd; border:1px solid #ffe69c; border-radius:8px; padding:2px 8px; margin:2px; font-weight:700; }
    .gps-btn {
      background:#fff; width:34px; height:34px; display:flex; align-items:center; justify-content:center;
      border:2px solid #0d6efd; border-radius:6px; cursor:pointer; font-size:16px;
    }
    .gps-btn.active { background:#0d6efd; color:#fff; }
  </style>
</head>
<body>
  <div id="title">🗺️ La Trinacria Perduda · El Secret de Palerm</div>
  <div id="progress">Peces trobades: <span id="pieces">0</span>/5</div>
  <div id="map"></div>

<script>
const map = L.map('map', {center:[38.1165, 13.3618], zoom:15});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);
L.control.scale().addTo(map);

let userMarker = null, userCircle = null, watchId = null, gpsActive = false;
const gpsControl = L.Control.extend({
  options:{position:'topleft'},
  onAdd: function() {
    const b = L.DomUtil.create('div', 'gps-btn');
    b.innerHTML = '📍';
    b.title = 'Activar/desactivar GPS';
    L.DomEvent.disableClickPropagation(b);
    b.onclick = () => {
      if (gpsActive) {
        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        watchId = null; gpsActive = false; b.classList.remove('active');
        if (userMarker) { map.removeLayer(userMarker); map.removeLayer(userCircle); userMarker=null; userCircle=null; }
      } else {
        if (!navigator.geolocation) return alert('Aquest navegador no suporta GPS');
        watchId = navigator.geolocation.watchPosition((p)=>{
          const latlng=[p.coords.latitude,p.coords.longitude];
          if (!userMarker) {
            userMarker = L.circleMarker(latlng,{radius:7,color:'#0d6efd',fillColor:'#fff',fillOpacity:1,weight:3}).addTo(map);
            userCircle = L.circle(latlng,{radius:Math.max(15,p.coords.accuracy||25),color:'#0d6efd',fillColor:'#0d6efd',fillOpacity:.12}).addTo(map);
            map.setView(latlng,16);
          } else {
            userMarker.setLatLng(latlng);
            userCircle.setLatLng(latlng);
            userCircle.setRadius(Math.max(15,p.coords.accuracy||25));
          }
        }, (e)=>console.warn(e.message), {enableHighAccuracy:true, maximumAge:0});
        gpsActive = true; b.classList.add('active');
      }
    };
    return b;
  }
});
map.addControl(new gpsControl());

const state = { current: 0, pieces: [] };
const piecesEl = document.getElementById('pieces');
function addPiece(piece) {
  if (!state.pieces.includes(piece)) state.pieces.push(piece);
  piecesEl.textContent = state.pieces.length;
}

const stops = [
  {
    id:1, name:'Teatro Massimo', lat:38.120806, lng:13.357181, clue:'PA',
    intro:'🎭 CAPÍTOL 1 — El Teatre dels Susurrs. Les pedres del Massimo amaguen el primer fragment del secret.',
    kids:'👧👦 Missió petits: trobar 2 detalls teatrals.',
    big:'🧠 Missió grans: explicar en 1 frase per què aquest lloc sembla un escenari gegant.',
    next:'Pista: ara cap al gran temple de la ciutat.'
  },
  {
    id:2, name:'Cattedrale di Palermo', lat:38.114599, lng:13.356300, clue:'LER',
    intro:'⛪ CAPÍTOL 2 — El Codi de les Torres. Una catedral feta de capes d’història us posa a prova.',
    kids:'👧👦 Missió petits: trobar 2 torres o agulles.',
    big:'🧠 Missió grans: localitzar un escut/símbol i deduir de quina època pot ser.',
    next:'Pista: busqueu el creuament barroc dels quatre cantons.'
  },
  {
    id:3, name:'Quattro Canti', lat:38.115687, lng:13.361267, clue:'MO',
    intro:'🧭 CAPÍTOL 3 — Els Quatre Vents. Al cor de Palerm, cada façana guarda una pista diferent.',
    kids:'👧👦 Missió petits: comptar les 4 façanes i trobar una font.',
    big:'🧠 Missió grans: detectar 2 diferències entre façanes oposades.',
    next:'Pista: aneu cap a la gran font de les figures misterioses.'
  },
  {
    id:4, name:'Fontana Pretoria', lat:38.115520, lng:13.362342, clue:'GE',
    intro:'💧 CAPÍTOL 4 — La Font dels Enigmes. Els guardians petrificats us donen el quart fragment.',
    kids:'👧👦 Missió petits: caça d’un animal i una figura humana.',
    big:'🧠 Missió grans: formular una hipòtesi de què simbolitza aquesta font.',
    next:'Pista: últim repte a les cúpules vermelles.'
  },
  {
    id:5, name:'Piazza Bellini', lat:38.114839, lng:13.362558, clue:'LATO',
    intro:'🔴 CAPÍTOL 5 — Les Cúpules Vermelles. Aquí s’amaga la clau final de la Trinacria.',
    kids:'👧👦 Missió petits: comptar cúpules visibles.',
    big:'🧠 Missió grans: identificar una barreja d’estils (àrab/normand).',
    next:'Final: amb les 5 peces, aneu a Piazza Marina a reclamar el tresor.'
  }
];

let finalMarker = null;
function showFinal() {
  if (finalMarker) return;
  finalMarker = L.marker([38.118467, 13.369816], {
    icon: L.divIcon({
      className:'',
      html:`<div style="width:30px;height:30px;border-radius:50%;background:#ff4d6d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid #fff;box-shadow:0 1px 8px rgba(0,0,0,.35)">🍦</div>`,
      iconSize:[30,30], iconAnchor:[15,15]
    })
  }).addTo(map).bindPopup(`
    <h3>🏁 FINAL ÈPIC · Piazza Marina</h3>
    <p>Peces trobades: ${state.pieces.map(p=>`<span class="code-chip">${p}</span>`).join(' ')}</p>
    <p><b>Codi final:</b> ${state.pieces.join('')}</p>
    <p>Heu reconstruït la Trinacria Perduda. Els guardians us reconeixen. La paraula final és:</p>
    <h2 style="margin:6px 0">🍦 PALERMO GELATO 🍦</h2>
    <p class="small">Premi desbloquejat: gelat o berenar per a tota l’expedició. Missió completada ✨</p>
  `);
  map.setView([38.118467, 13.369816], 16);
  finalMarker.openPopup();
}

function mkStopPopup(s, idx) {
  const isLocked = idx !== state.current;
  return `
    <h3>📍 Prova ${s.id}: ${s.name}</h3>
    <p>${s.intro}</p>
    <p class="small">${s.kids}<br>${s.big}</p>
    <p><b>Peça de codi (quan ho resolgueu):</b> <span class="code-chip">${s.clue}</span></p>
    <p class="small">${s.next}</p>
    <button class="btn" ${isLocked ? 'disabled' : ''} onclick="completeStop(${idx})">✅ Prova superada</button>
  `;
}

const markers = stops.map((s, idx) => {
  const icon = L.divIcon({
    className:'',
    html:`<div style="width:28px;height:28px;border-radius:50%;background:${idx===0?'#0d6efd':'#6c757d'};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.3)">${s.id}</div>`,
    iconSize:[28,28], iconAnchor:[14,14]
  });
  const m = L.marker([s.lat,s.lng],{icon}).addTo(map).bindPopup(mkStopPopup(s, idx));
  return m;
});

window.completeStop = function(idx){
  const s = stops[idx];
  if (idx !== state.current) return;
  addPiece(s.clue);
  state.current += 1;

  markers[idx].setIcon(L.divIcon({
    html:`<div style="width:28px;height:28px;border-radius:50%;background:#198754;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.3)">✓</div>`,
    iconSize:[28,28], iconAnchor:[14,14]
  }));

  if (state.current < stops.length) {
    const next = markers[state.current];
    next.setIcon(L.divIcon({
      html:`<div style="width:28px;height:28px;border-radius:50%;background:#0d6efd;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.3)">${stops[state.current].id}</div>`,
      iconSize:[28,28], iconAnchor:[14,14]
    }));
    next.bindPopup(mkStopPopup(stops[state.current], state.current)).openPopup();
  } else {
    showFinal();
    alert('🎉 Última prova superada! El tresor final s’ha desbloquejat: aneu al marcador 🍦 de Piazza Marina.');
  }
};

const start = L.marker([38.120806, 13.357181]).addTo(map);
start.bindPopup(`
  <h3>🚩 La Trinacria Perduda · Pròleg</h3>
  <p>Fa segles, els guardians de Palerm van amagar la <b>Trinacria de la Llum</b> en 5 fragments. Avui la vostra expedició l'ha de reconstruir.</p>
  <p class="small">👧👦 Petits: detectius d'observació · 🧠 Grans: estrategues de deducció · Adults: comandament de missió.</p>
  <button class="btn" onclick="map.closePopup(); markers[0].openPopup();">Començar l’aventura!</button>
  <p class="small">Durada objectiu: 60–120 min · Distància: ~2 km · Recompensa final: 🍦</p>
`).openPopup();
</script>
</body>
</html>
